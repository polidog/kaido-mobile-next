const STORAGE_KEY = 'kaido-impl-plan-done';
function loadDone() {
  try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); }
  catch { return new Set(); }
}
function saveDone(set) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
}
let doneSet = loadDone();

// ── 描画 ──────────────────────────────────────────────
const phaseColors = {
  '--blue':   { bg: 'var(--blue-bg)',   fg: 'var(--blue)' },
  '--teal':   { bg: 'var(--teal-bg)',   fg: 'var(--teal)' },
  '--green':  { bg: 'var(--green-bg)',  fg: 'var(--green)' },
  '--purple': { bg: 'var(--purple-bg)', fg: 'var(--purple)' },
  '--orange': { bg: 'var(--orange-bg)', fg: 'var(--orange)' },
  '--red':    { bg: 'var(--red-bg)',    fg: 'var(--red)' },
  '--accent': { bg: 'var(--accent-light)', fg: 'var(--accent)' },
};

function renderAll() {
  const container = document.getElementById('phases');
  container.innerHTML = '';
  let totalTasks = 0, totalDone = 0;

  for (const phase of PHASES) {
    const c = phaseColors[phase.color] || phaseColors['--blue'];
    const phaseDone = phase.tasks.filter(t => doneSet.has(t.id)).length;
    totalTasks += phase.tasks.length;
    totalDone += phaseDone;

    const div = document.createElement('div');
    div.className = 'phase';
    div.innerHTML = `
      <div class="phase-header" data-phase="${phase.id}">
        <span class="phase-badge" style="background:${c.bg};color:${c.fg}">${phase.num}</span>
        <span class="phase-title">${phase.title}</span>
        <span class="phase-meta">${phaseDone}/${phase.tasks.length} · ${phase.estimate}</span>
        <span class="phase-chevron">▼</span>
      </div>
      <div class="phase-body">
        <p class="phase-desc">${phase.desc}</p>
        ${phase.tasks.map(t => renderTask(t, c)).join('')}
        ${phase.milestone ? `<div class="milestone"><span class="milestone-icon">◆</span>${phase.milestone}</div>` : ''}
      </div>
    `;
    container.appendChild(div);

    div.querySelector('.phase-header').addEventListener('click', () => {
      div.classList.toggle('collapsed');
    });

    div.querySelectorAll('.task-check').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        const id = el.dataset.id;
        if (doneSet.has(id)) doneSet.delete(id); else doneSet.add(id);
        saveDone(doneSet);
        renderAll();
      });
    });
  }

  const pct = totalTasks ? Math.round(totalDone / totalTasks * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${totalDone} / ${totalTasks} タスク完了`;
  document.getElementById('progress-pct').textContent = pct + '%';
}

function renderTask(t, c) {
  const done = doneSet.has(t.id);
  const tags = (t.tags || []).map(tag => {
    if (tag.match(/^[\d.]+h$/)) return `<span class="tag tag-effort">${tag}</span>`;
    if (tag.match(/^(kaido_|tokaido|nakasendo|koshu|nikko|oshu)/)) return `<span class="tag tag-pkg">${tag}</span>`;
    return `<span class="tag tag-cmd">${tag}</span>`;
  }).join('');
  const deps = t.deps ? `<div class="task-deps">${t.deps.map(d => findTaskName(d)).join(', ')}</div>` : '';
  return `
    <div class="task ${done ? 'done' : ''}">
      <div class="task-check" data-id="${t.id}"></div>
      <div class="task-content">
        <div class="task-name">${t.name}</div>
        <div class="task-detail">${t.detail}</div>
        ${deps}
        <div class="task-tags">${tags}</div>
      </div>
    </div>`;
}

function findTaskName(id) {
  for (const p of PHASES) for (const t of p.tasks) if (t.id === id) return t.name;
  return id;
}

renderAll();
</script>

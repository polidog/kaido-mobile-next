name: kaido_ui
description: Shared UI (theme, router, app shell) for the Kaido mobile apps.
publish_to: none
version: 0.0.1

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  google_maps_flutter: ^2.17.1
  kaido_data:
    path: ../kaido_data
  url_launcher: ^6.3.2
  webview_flutter: ^4.14.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.3.0
  webview_flutter_platform_interface: ^2.15.1
